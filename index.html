<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth in Real Estate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; color: #a0a0b0; margin-bottom: 2rem; }
    h1 { font-size: 3rem; font-weight: 700; line-height: 1.1; margin-bottom: 1.5rem; }
    h1 span { color: #c9a84c; }
    p { font-size: 1.1rem; color: #a0a0b0; max-width: 480px; line-height: 1.7; margin-bottom: 3rem; }
    .links { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    a {
      padding: 0.75rem 2rem;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.8; }
    .primary { background: #c9a84c; color: #0f1117; }
    .secondary { border: 1px solid #333; color: #ffffff; }
    .coming-soon {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo">Truth in Real Estate</div>
  <h1>Real estate advice you can <span>trust.</span></h1>
  <p>We match sellers with vetted, seller-focused agents — no upsells, no pressure, no guesswork.</p>
  <div class="links">
    <a class="primary" href="https://tire-clients.fly.dev">I'm a Seller or Buyer</a>
    <a class="secondary" href="https://tire-agents.fly.dev">I'm an Agent</a>
  </div>
  <div class="coming-soon">Full site coming soon &mdash; truthinrealestate.com</div>
</body>
</html>
